# DSM2 Flow Visualization Layer Configuration
# =============================================
# Used with:
#   dsm2ui animate flow  hydro.h5 --flow-config flow_config.yaml
#   dsm2ui animate qual  ec.h5    --flow-config flow_config.yaml --hydro-h5 hydro.h5
#
# Arrow length/bar height at reference_flow maps to reference_arrow_length_m /
# bar_max_height_m (in EPSG:3857 metres).  Adjust these to suit the map zoom level.

# ---- Scaling ----------------------------------------------------------------
# scale_mode options (most to least non-linear compression):
#   cbrt   — cube root: even 1% flows show at ~21% of reference size (most visible)
#   sqrt   — square root: 1% flows show at ~10% of reference size
#   log    — log base-2: 1% flows show at ~1.4% of reference size
#   linear — proportional: 1% flows show at 1% of reference size
scale_mode: cbrt              # changed from log — shows smaller flows more visibly
reference_flow: 10000         # cfs — flow value that maps to reference sizes below
reference_arrow_length_m: 4000  # metres (EPSG:3857): arrow length at reference_flow
arrow_width_m: 600            # arrow body half-width in metres
bar_max_height_m: 5000        # bar height in metres at reference_flow
bar_width_m: 600              # each bar side (inflow / outflow) width in metres
min_flow_cfs: 50              # flows below this show a stub symbol only

# ---- Colour mapping ---------------------------------------------------------
# Diverging colormap: positive flow → warm end, negative → cool end, zero → neutral.
# Available: coolwarm, RdBu_r, RdYlBu_r, seismic, bwr, PiYG
colormap: coolwarm

# Color range in cfs.  Flows outside this range saturate at the colormap extremes.
# Zero is always pinned to the neutral colormap midpoint (TwoSlopeNorm), so the
# negative and positive sides can have independent saturation thresholds.
# null means auto: flow_vmin defaults to -reference_flow, flow_vmax to +reference_flow
flow_vmin: -10000             # cool end saturates at this value (cfs)
flow_vmax: 50000              # warm end saturates at this value (cfs)

# ---- Flow arrows (one per channel) -----------------------------------------
# position: 0.0 = upstream end, 0.5 = midpoint, 1.0 = downstream end
