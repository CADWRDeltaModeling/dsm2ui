# ---- Reservoir connection arrows -------------------------------------------
# Reads /hydro/data/reservoir flow via /hydro/geometry/reservoir_node_connect
# direction_deg: 0=East 90=North 180=West 270=South
# point: [lat, lon]  optional — overrides the node's geographic position on the map
#   Use when the node location doesn't look right or you want a cleaner placement.
#   node is still required for ReservoirArrowSpec (identifies the flow column).
# Available reservoirs in this model:
#   clifton_court@72, decker_island@414/416, discovery_bay@197/198,
#   franks_tract@102/103/216/219/224/225/232, liberty@322,
#   little_franks_tract@220, mildred@127/129/130/136, tule_red@228, yolo_flyway@713
reservoir_arrows:
  - reservoir: clifton_court
    node: 72
    direction_deg: 0          # SW — points toward CCF reservoir location
    label: "CCF Inflow (ch↔res)"
    # point: [37.816, -121.573]  # optional: override map placement with lat/lon

# ---- Qext (external source/sink) arrows ------------------------------------
# Reads /hydro/data/qext flow via /hydro/geometry/qext
# point: [lat, lon]  replaces 'node' for positioning (node optional when point given)
# Available pumping entries: swp, cvp, jones_pumpout, pump62, pump63
qext_arrows:
  - name: swp
    # node: 72                    # place near CCF (SWP pumps from CCF)
    direction_deg: 60            # E = inflow direction; negative flow (export) → arrow points W
    label: "SWP Banks Pumping"
    point: [37.80068,-121.62090]  # alternative to node — set exact lat/lon position
  - name: cvp
    # node: 179                   # CVP Jones Pumping Plant area
    direction_deg: 60           # N = inflow direction; negative flow (export) → arrow points S
    label: "CVP Jones Pumping"
    point: [37.79135, -121.58725]
    # point: [37.820, -121.560]  # alternative: place at exact plant coordinates

