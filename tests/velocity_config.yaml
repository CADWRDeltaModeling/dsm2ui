# DSM2 Velocity Arrow Configuration
# ====================================
# Used with --velocity-config (mutually exclusive with --flow-config):
#   dsm2ui animate hydro hydro.h5 --velocity-config velocity_config.yaml
#   dsm2ui animate qual  ec.h5    --velocity-config velocity_config.yaml --hydro-h5 hydro.h5
#
# variable: velocity  — arrows are scaled by channel velocity (ft/s) = flow / area
# scale_mode: linear  — arrow length is directly proportional to velocity
# reference_velocity  — velocity (ft/s) that maps to reference_arrow_length_m
#
# When used with --velocity-config, the 'variable' field here is redundant but

# ---- Variable ---------------------------------------------------------------
variable: velocity            # dispatch HydroH5VelocityReader instead of FlowReader

# ---- Scaling ----------------------------------------------------------------
scale_mode: linear            # proportional: 1 ft/s shows at 1/3 of reference size
reference_velocity: 3.0       # ft/s — velocity that maps to reference_arrow_length_m
reference_arrow_length_m: 4000  # metres (EPSG:3857): arrow length at reference_velocity
arrow_width_m: 900            # arrow body half-width in metres
bar_max_height_m: 5000        # bar height at reference_velocity (junction bars)
bar_width_m: 600              # each bar side width in metres

# ---- Colour mapping ---------------------------------------------------------
# Diverging colormap: positive (ebb) → warm end, negative (flood) → cool end.
colormap: coolwarm

# Colour range in ft/s.  Values outside this range saturate at the extremes.
# Zero is pinned to the neutral midpoint (TwoSlopeNorm).
flow_vmin: -3.0               # flood (negative) saturation threshold in ft/s
flow_vmax:  3.0               # ebb  (positive) saturation threshold in ft/s

# ---- Velocity arrows (one per channel) -------------------------------------
# position: 0.0 = upstream end, 0.5 = midpoint, 1.0 = downstream end
# Arrow direction flips automatically with tidal sign.
arrows:
