# DSM2 Stage Deviation Bar Configuration
# =======================================
# Used with:
#   dsm2ui animate hydro hydro.h5 --variable stage --stage-config stage_config.yaml
#   dsm2ui animate qual  ec.h5    --stage-config stage_config.yaml --hydro-h5 hydro.h5
#
# Each bar shows the deviation of instantaneous stage from a user-supplied mean.
# Bars above mean are steelblue (high water), below mean are crimson (low water).
# Bar height is proportional to deviation; reference_stage_range_ft sets the
# deviation that fills bar_max_height_m.
#
# NOTE ON mean_stage_ft UNITS
# ============================
# The --variable stage reader returns WATER-SURFACE ELEVATION in feet
# above datum (ft NAVD88), NOT depth above the channel bottom.
# (The raw HDF5 "channel stage" dataset stores depth; dsm2ui automatically
# corrects it by adding /hydro/geometry/channel_bottom.  See DSM2 issue #164.)
#
# mean_stage_ft MUST be a datum-referenced elevation (ft NAVD88 or NGVD29),
# not a depth.  Compute it as the temporal mean of the corrected stage over
# your calibration period using e.g.:
#
#   from pydsm.output.hydroh5 import HydroH5
#   h5 = HydroH5("hydro.h5")
#   s = h5.get_channel_stage(channel_id="17", location_id="upstream",
#                             timewindow="01OCT2014 - 30SEP2017")
#   mean_stage_ft = float(s.mean())
#
# Placeholder values below are approximate NAVD88 means for the FC/MSS grid.
# Replace with values computed from your actual HDF5 file.

# ---- Scaling ----------------------------------------------------------------
bar_width_m: 300                 # bar width in metres (EPSG:3857)
bar_max_height_m: 600            # bar height at ±reference_stage_range_ft
reference_stage_range_ft: 3.0    # stage deviation (ft) that fills bar_max_height_m
show_labels: true

# ---- Stage bars (one per channel) ------------------------------------------
# position: 0.0 = upstream end, 0.5 = midpoint, 1.0 = downstream end
# mean_stage_ft: reference water-surface ELEVATION in ft NAVD88
#   (computed as temporal mean of HydroH5StageReader output over first ~42 days
#    of hist_fc_mss.h5; replace with your period-of-interest mean)
